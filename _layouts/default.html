<!DOCTYPE html>

<!-- Language -->
<html lang="en-AU">

<!-- Head -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Website title (the name that appears in the tab of the browser) -->
  <title>Athena Accounting and Advisory Services</title>

  <!-- Website description -->
  <meta name="description" content="Athena Accounting and Advisory Services">

  <!-- Style sheet -->
  <link rel="stylesheet" href="css/style.css">
</head>

<!-- Body -->
<body>
  {% include banner.html %}

  <script>
    // 1. Select the banner element
    const banner = document.getElementById('banner-id');

    // 2. Create an observer to watch for height changes
    const resizeObserver = new ResizeObserver(entries => {
      for (let entry of entries) {
        // Get the exact, real-time height of the banner
        const bannerHeight = entry.target.offsetHeight;
        
        // Apply that height as top margin to the body
        document.body.style.marginTop = `${bannerHeight}px`;
      }
    });

    // 3. Start observing the banner
    resizeObserver.observe(banner);
  </script>

  <div class="accent-extender"></div>

  <main>
    {{ content }}
  </main>
  {% include footer.html %}
</body>
</html>
